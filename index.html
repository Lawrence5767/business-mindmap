<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Structure — New Sdn Bhd</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Header */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 {
    font-size: 18px; font-weight: 600; color: #f1f5f9;
    letter-spacing: -0.02em;
  }
  .header .subtitle {
    font-size: 12px; color: #64748b; margin-top: 2px;
  }

  /* Legend */
  .legend {
    position: fixed; bottom: 24px; left: 24px; z-index: 100;
    background: rgba(30, 41, 59, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 8px;
    font-size: 12px;
  }
  .legend-title { font-weight: 600; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Canvas area */
  .canvas-wrap {
    width: 100vw; height: 100vh;
    cursor: grab;
  }
  .canvas-wrap:active { cursor: grabbing; }

  svg {
    width: 100%; height: 100%;
  }

  /* Nodes */
  .node { cursor: pointer; }
  .node rect, .node ellipse {
    transition: filter 0.2s, transform 0.2s;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }
  .node:hover rect, .node:hover ellipse {
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)) brightness(1.15);
  }
  .node text {
    pointer-events: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  /* Connection lines */
  .conn {
    stroke-width: 2;
    fill: none;
    opacity: 0.5;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(30, 41, 59, 0.98);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
    line-height: 1.5;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .tooltip.show { opacity: 1; transform: translateY(0); }
  .tooltip .tt-title { font-weight: 600; margin-bottom: 6px; font-size: 14px; }
  .tooltip .tt-body { color: #94a3b8; }

  /* Zoom controls */
  .zoom-controls {
    position: fixed; bottom: 24px; right: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 4px;
  }
  .zoom-btn {
    width: 40px; height: 40px;
    background: rgba(30, 41, 59, 0.95);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 10px;
    color: #e2e8f0;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .zoom-btn:hover { background: rgba(51, 65, 85, 0.95); }

  /* Dashed line label */
  .conn-label {
    font-size: 10px;
    fill: #64748b;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Proposed Business Structure</h1>
    <div class="subtitle">New Sdn Bhd — Family Business Setup</div>
  </div>
</div>

<div class="legend">
  <div class="legend-title">Legend</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> Investor (Shareholder)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> Company (Sdn Bhd)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div> Business Division</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div> Person In Charge (PIC)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#64748b"></div> Existing Sole Proprietorship</div>
  <div class="legend-item" style="margin-top:4px">
    <svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#64748b" stroke-width="2" stroke-dasharray="4,3"/></svg>
    Service / Rental Agreement
  </div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" onclick="zoomIn()">+</button>
  <button class="zoom-btn" onclick="zoomOut()">−</button>
  <button class="zoom-btn" onclick="resetView()" style="font-size:12px">⟲</button>
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-body" id="tt-body"></div>
</div>

<div class="canvas-wrap" id="canvasWrap">
<svg id="svg" viewBox="0 0 1200 800">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#475569" stroke-width="1"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/>
    </marker>
    <linearGradient id="grad-investor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="grad-company" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="grad-division" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="grad-pic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="grad-sole" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.04"/>
    </linearGradient>
  </defs>

  <g id="panGroup">
    <!-- ============ CONNECTION LINES ============ -->

    <!-- Investors → Sdn Bhd -->
    <path class="conn" d="M280,195 Q280,260 480,320" stroke="#f59e0b" marker-end="url(#arrow)"/>
    <path class="conn" d="M600,195 Q600,260 600,310" stroke="#f59e0b" marker-end="url(#arrow)"/>
    <path class="conn" d="M920,195 Q920,260 720,320" stroke="#f59e0b" marker-end="url(#arrow)"/>

    <!-- Sdn Bhd → Divisions -->
    <path class="conn" d="M520,390 Q520,440 380,470" stroke="#3b82f6" marker-end="url(#arrow)"/>
    <path class="conn" d="M680,390 Q680,440 820,470" stroke="#3b82f6" marker-end="url(#arrow)"/>

    <!-- Divisions → PICs -->
    <path class="conn" d="M380,530 Q380,570 380,590" stroke="#10b981" marker-end="url(#arrow)"/>
    <path class="conn" d="M820,530 Q820,570 820,590" stroke="#10b981" marker-end="url(#arrow)"/>

    <!-- OYK Enterprise (sole prop) dashed → Sdn Bhd -->
    <path class="conn" d="M140,290 Q250,340 470,350" stroke="#64748b" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
    <text class="conn-label" x="240" y="300" transform="rotate(-8, 240, 300)">Rental Agreement</text>

    <!-- NextGen (sole prop) dashed → Sdn Bhd -->
    <path class="conn" d="M1050,290 Q940,340 730,350" stroke="#64748b" stroke-dasharray="6,4" marker-end="url(#arrow-dashed)"/>
    <text class="conn-label" x="870" y="298" transform="rotate(8, 870, 298)">Marketing Services</text>


    <!-- ============ INVESTOR NODES (Row 1) ============ -->

    <!-- Dad -->
    <g class="node" data-title="Dad (OYK Owner)" data-info="Invests personally as a shareholder into the Sdn Bhd. OYK Enterprise provides the shop space via a separate rental agreement.">
      <rect x="200" y="130" width="160" height="65" rx="14" fill="url(#grad-investor)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="280" y="155" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="0.05em">INVESTOR</text>
      <text x="280" y="178" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Dad</text>
    </g>

    <!-- Lawrence -->
    <g class="node" data-title="Lawrence (You)" data-info="Invests personally as a shareholder and serves as co-Director. NextGen Marketing Solutions provides marketing services to the Sdn Bhd via a separate service agreement.">
      <rect x="520" y="130" width="160" height="65" rx="14" fill="url(#grad-investor)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="600" y="155" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="0.05em">INVESTOR + DIRECTOR</text>
      <text x="600" y="178" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Lawrence</text>
    </g>

    <!-- Jim -->
    <g class="node" data-title="Jim" data-info="Invests personally as a shareholder and serves as co-Director. Also the PIC for the Online division.">
      <rect x="840" y="130" width="160" height="65" rx="14" fill="url(#grad-investor)" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="920" y="155" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600" letter-spacing="0.05em">INVESTOR + DIRECTOR</text>
      <text x="920" y="178" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Jim</text>
    </g>


    <!-- ============ SOLE PROP NODES (Side) ============ -->

    <!-- OYK Enterprise -->
    <g class="node" data-title="OYK Enterprise" data-info="Dad's existing sole proprietorship. Cannot invest as an entity — Dad invests personally. OYK provides the physical shop space to the Sdn Bhd via a rental agreement.">
      <rect x="60" y="240" width="160" height="55" rx="12" fill="url(#grad-sole)" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="140" y="262" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.05em">SOLE PROP</text>
      <text x="140" y="280" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">OYK Enterprise</text>
    </g>

    <!-- NextGen Marketing -->
    <g class="node" data-title="NextGen Marketing Solutions" data-info="Lawrence's existing sole proprietorship (003624569-H). Cannot invest as an entity — Lawrence invests personally. NextGen bills the Sdn Bhd separately for marketing services. This keeps income streams separate (dividends + service fees).">
      <rect x="970" y="240" width="180" height="55" rx="12" fill="url(#grad-sole)" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="1060" y="262" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.05em">SOLE PROP</text>
      <text x="1060" y="280" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="600">NextGen Marketing</text>
    </g>


    <!-- ============ SDN BHD (Central Node) ============ -->

    <g class="node" data-title="New Sdn Bhd" data-info="The new company to be registered under SSM. All 3 investors hold shares. Jim and Lawrence serve as Directors. Limited liability protects all shareholders' personal assets.">
      <rect x="460" y="310" width="280" height="80" rx="16" fill="url(#grad-company)" stroke="#3b82f6" stroke-width="2"/>
      <text x="600" y="338" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600" letter-spacing="0.05em">SDN BHD (PRIVATE LIMITED)</text>
      <text x="600" y="362" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">New Company</text>
      <text x="600" y="380" text-anchor="middle" fill="#94a3b8" font-size="11">Directors: Jim + Lawrence</text>
    </g>


    <!-- ============ DIVISION NODES (Row 3) ============ -->

    <!-- Offline -->
    <g class="node" data-title="Offline Division" data-info="Physical retail operations at Dad's shop location. Handles walk-in customers, showroom, and in-store sales.">
      <rect x="280" y="475" width="200" height="55" rx="12" fill="url(#grad-division)" stroke="#10b981" stroke-width="1.5"/>
      <text x="380" y="497" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600" letter-spacing="0.05em">BUSINESS DIVISION</text>
      <text x="380" y="516" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Offline (Retail)</text>
    </g>

    <!-- Online -->
    <g class="node" data-title="Online Division" data-info="E-commerce and digital sales operations. Handles online orders, website, and digital marketing channels.">
      <rect x="720" y="475" width="200" height="55" rx="12" fill="url(#grad-division)" stroke="#10b981" stroke-width="1.5"/>
      <text x="820" y="497" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600" letter-spacing="0.05em">BUSINESS DIVISION</text>
      <text x="820" y="516" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="700">Online (E-commerce)</text>
    </g>


    <!-- ============ PIC NODES (Row 4) ============ -->

    <!-- LPK -->
    <g class="node" data-title="LPK — Offline PIC" data-info="Person in charge of day-to-day offline/retail operations. Manages the physical shop, inventory, and walk-in customers.">
      <rect x="310" y="595" width="140" height="50" rx="12" fill="url(#grad-pic)" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="380" y="614" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600" letter-spacing="0.05em">PIC</text>
      <text x="380" y="632" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">LPK</text>
    </g>

    <!-- Jim (PIC) -->
    <g class="node" data-title="Jim — Online PIC" data-info="Person in charge of day-to-day online/e-commerce operations. Manages the website, online orders, and digital channels.">
      <rect x="750" y="595" width="140" height="50" rx="12" fill="url(#grad-pic)" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="820" y="614" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600" letter-spacing="0.05em">PIC</text>
      <text x="820" y="632" text-anchor="middle" fill="#f1f5f9" font-size="14" font-weight="700">Jim</text>
    </g>

  </g>
</svg>
</div>

<script>
  // === Pan & Zoom ===
  const svg = document.getElementById('svg');
  const panGroup = document.getElementById('panGroup');
  const wrap = document.getElementById('canvasWrap');
  let scale = 1, panX = 0, panY = 0;
  let isPanning = false, startX, startY;

  function applyTransform() {
    panGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
  }

  wrap.addEventListener('mousedown', e => {
    if (e.target.closest('.node')) return;
    isPanning = true;
    startX = e.clientX - panX;
    startY = e.clientY - panY;
  });
  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    panX = e.clientX - startX;
    panY = e.clientY - startY;
    applyTransform();
  });
  window.addEventListener('mouseup', () => isPanning = false);

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    scale = Math.min(3, Math.max(0.3, scale * delta));
    applyTransform();
  }, { passive: false });

  function zoomIn() { scale = Math.min(3, scale * 1.2); applyTransform(); }
  function zoomOut() { scale = Math.max(0.3, scale * 0.8); applyTransform(); }
  function resetView() { scale = 1; panX = 0; panY = 0; applyTransform(); }

  // === Tooltip ===
  const tooltip = document.getElementById('tooltip');
  const ttTitle = document.getElementById('tt-title');
  const ttBody = document.getElementById('tt-body');

  document.querySelectorAll('.node').forEach(node => {
    node.addEventListener('mouseenter', e => {
      ttTitle.textContent = node.dataset.title;
      ttBody.textContent = node.dataset.info;
      tooltip.classList.add('show');
    });
    node.addEventListener('mousemove', e => {
      let x = e.clientX + 16;
      let y = e.clientY + 12;
      if (x + 280 > window.innerWidth) x = e.clientX - 296;
      if (y + 120 > window.innerHeight) y = e.clientY - 120;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    });
    node.addEventListener('mouseleave', () => {
      tooltip.classList.remove('show');
    });
  });

  // Touch support
  let lastTouchDist = 0;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isPanning = true;
      startX = e.touches[0].clientX - panX;
      startY = e.touches[0].clientY - panY;
    } else if (e.touches.length === 2) {
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });
  wrap.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isPanning) {
      panX = e.touches[0].clientX - startX;
      panY = e.touches[0].clientY - startY;
      applyTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const delta = dist / lastTouchDist;
      scale = Math.min(3, Math.max(0.3, scale * delta));
      lastTouchDist = dist;
      applyTransform();
    }
  }, { passive: false });
  wrap.addEventListener('touchend', () => isPanning = false);
</script>

</body>
</html>
